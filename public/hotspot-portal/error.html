<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login Error</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui;background:#fff7ed;color:#0f172a}.card{max-width:460px;background:#fff;border:1px solid #fed7aa;border-radius:28px;box-shadow:0 20px 60px rgba(15,23,42,.08);padding:30px;text-align:center}.err{color:#b91c1c;font-weight:900}.btn{display:inline-block;background:#10b981;color:#fff;text-decoration:none;border-radius:16px;padding:14px 18px;font-weight:900}</style></head><body><div class="card"><h1>Connection failed</h1><p class="err">$(error)</p><p>Check your username/password or contact your ISP admin.</p><a class="btn" href="$(link-login)">Try again</a></div></body></html>
