<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta http-equiv="pragma" content="no-cache"><meta http-equiv="expires" content="-1"><meta name="viewport" content="width=device-width, initial-scale=1"><meta http-equiv="refresh" content="15"><title>Internet Status - StudyRoom Connect</title>
<style>:root{--primary:#2563eb;--green:#10b981;--red:#ef4444;--text:#0f172a;--muted:#64748b;--line:#e5e7eb}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f8fbff,#fff);color:var(--text);min-height:100vh;padding:18px}.page{max-width:780px;margin:0 auto}.card{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 20px 60px rgba(15,23,42,.08);padding:24px;margin-top:18px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:12px}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;display:grid;place-items:center;font-weight:900;font-size:22px}h1{margin:0;font-size:28px}.muted{color:var(--muted);margin:4px 0 0}.badge{background:#ecfdf5;color:#047857;border:1px solid #bbf7d0;border-radius:999px;padding:9px 13px;font-weight:900;font-size:13px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}.stat{border:1px solid #eef2f7;background:#f8fafc;border-radius:20px;padding:16px}.stat span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:900}.stat strong{display:block;margin-top:6px;font-size:22px;overflow-wrap:anywhere}table{width:100%;border-collapse:collapse;margin-top:14px}td{padding:13px 0;border-bottom:1px solid #eef2f7}td:first-child{color:var(--muted);font-weight:800}td:last-child{text-align:right;font-weight:900;overflow-wrap:anywhere}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:18px}.btn{display:flex;justify-content:center;align-items:center;min-height:52px;border-radius:16px;text-decoration:none;font-weight:900;color:#fff;background:#2563eb;text-align:center;padding:10px}.btn.green{background:#10b981}.btn.red{background:#ef4444}.btn.light{background:#fff;color:#2563eb;border:1px solid rgba(37,99,235,.3)}@media(max-width:620px){.grid,.actions{grid-template-columns:1fr}.top{align-items:flex-start}.badge{display:none}}</style>
</head>
<body><div class="page"><div class="card"><div class="top"><div class="brand"><div class="logo">SR</div><div><h1>Internet Status</h1><p class="muted">Session auto-refreshes every 15 seconds.</p></div></div><div class="badge">● Online</div></div><div class="grid"><div class="stat"><span>Downloaded</span><strong>$(bytes-out-nice)</strong></div><div class="stat"><span>Uploaded</span><strong>$(bytes-in-nice)</strong></div><div class="stat"><span>Uptime</span><strong>$(uptime)</strong></div><div class="stat"><span>Time Left</span><strong>$(session-time-left)</strong></div></div><table><tr><td>User</td><td>$(username)</td></tr><tr><td>IP Address</td><td>$(ip)</td></tr><tr><td>MAC Address</td><td>$(mac)</td></tr><tr><td>Refresh</td><td><a href="$(link-status)">Refresh now</a></td></tr></table><div class="actions"><a class="btn green" href="$(link-orig)">Continue Browsing</a><a class="btn light" href="$(link-status)">Refresh Status</a><a class="btn red" href="$(link-logout)">Logout</a></div></div></div></body></html>
